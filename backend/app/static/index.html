<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PM MVP Backend Hello</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: var(--navy-dark);
      }

      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
      }

      .card {
        background: white;
        border: 1px solid rgba(3, 33, 71, 0.1);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 26px rgba(3, 33, 71, 0.08);
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 16px;
        color: var(--gray-text);
      }

      pre {
        margin: 0;
        border-left: 4px solid var(--accent-yellow);
        background: #f3f9fd;
        padding: 12px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Hello from FastAPI</h1>
        <p>This static page confirms Part 2 scaffolding is running.</p>
        <pre id="health-output">Loading /api/health ...</pre>
      </section>
    </main>
    <script>
      const output = document.getElementById("health-output");

      async function loadHealth() {
        try {
          const response = await fetch("/api/health");
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = "Failed to call /api/health: " + error.message;
        }
      }

      loadHealth();
    </script>
  </body>
</html>
